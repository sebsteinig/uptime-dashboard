# Upptime configuration - uptime monitor and status page
# Docs: https://upptime.js.org/docs/configuration

owner: sebsteinig
repo: uptime-dashboard

# Assignee receives GitHub email when a downtime issue is opened
assignees:
  - sebsteinig

sites:
  # CAMS services (PROD)
  - name: Methane Explorer (PROD)
    url: https://apps.atmosphere.copernicus.eu/methane-explorer/
  - name: CAMS Data Sites (sites.ecmwf.int)
    url: https://sites.ecmwf.int/data/cams/
    slug: cams-data-sites


  # CAMS services (DEV)
  - name: vAirify (dashboard)
    url: http://64.225.143.231/city/summary
  - name: vAirify (API)
    url: "http://64.225.143.231/api/air-pollutant/measurements?date_from=2026-03-02T12:00:00.000Z&date_to=2026-03-03T12:00:00.000Z&location_type=city&location_names=Brussels"
    slug: vairify-measurements-api
  - name: Fire Watch (website)
    url: https://apps.atmosphere.copernicus.eu/fire-watch/
    headers:
      - "Authorization: Basic $FIRE_WATCH_AUTH"
  - name: GFAS (API)
    url: "https://apps.atmosphere.copernicus.eu/gfas/api/api/anomalies/?variable=cfire&start_date=2026-01-01&end_date=2026-01-31&adm0=ALL&all_years=true&aggregation=SUM&timeout=120"
  - name: Methane Explorer (DEV)
    url: https://apps.copernicus-climate.eu/methane-explorer/
    headers:
      - "Authorization: Basic $Methane_Explorer_DEV_AUTH"
  - name: Zarr Globe (website)
    url: https://apps.atmosphere.copernicus.eu/zarr-globe

  # Climate Archive
  - name: Climate Archive (website)
    url: https://climatearchive.org
  - name: Climate Archive (Java API)
    url: https://api.climatearchive.org:8443/getData?lat=37.10&lon=9.5&model=tfksu
    slug: climate-archive-java-api
  - name: Climate Archive (Flask API)
    url: https://data.climatearchive.org/api/get_ts_data_cmip
    method: POST
    headers:
      - "Content-Type: application/json" 
    body: '{"model_id":"ssp126","location":[37.10,9.5],"variable":"tas","frequency":"ym"}'
    slug: climate-archive-flask-api
  - name: GPlates Reconstruct (API)
    url: "https://gws.gplates.org/reconstruct/reconstruct_points/?lats=49&lons=6&times=102.6,97.2,91.9,86.7,80.8,75,69,66,61,56,51.9,44.5,39.5,35.9,31,25.6,19.5,14.9,10.5,3.1,0"
    slug: gplates-reconstruct-api

status-website:
  # Use baseUrl for GitHub Pages (https://sebsteinig.github.io/uptime-dashboard/)
  baseUrl: /uptime-dashboard
  name: Status Dashboard
  introTitle: "**Status Dashboard** "
  introMessage: This status page tracks the uptime and response times of selected CAMS apps and services, as well as some private projects. Powered by [Upptime](https://upptime.js.org) — GitHub Actions, Issues, and Pages.
  navbar:
    - title: Status
      href: /uptime-dashboard/
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
  # Pure CSS grouping via ::before on article elements inside section.live-status.
  # Sites order: 1-6 = CAMS PROD, 7 = CAMS DEV, 8-10 = Climate Archive.
  # If you add/remove/reorder sites, update the nth-of-type numbers below.
  customHeadHtml: |
    <style>
    section.live-status > article:nth-of-type(1) {
      margin-top: 2.5rem;
    }
    section.live-status > article:nth-of-type(3),
    section.live-status > article:nth-of-type(9) {
      margin-top: 3.5rem;
    }
    section.live-status > article:nth-of-type(1)::before,
    section.live-status > article:nth-of-type(3)::before,
    section.live-status > article:nth-of-type(9)::before {
      position: absolute;
      top: -2.2rem;
      left: 0;
      right: 0;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--body-text-color, #f0ffff);
      padding-bottom: 0.3rem;
      border-bottom: 2px solid var(--nav-border-bottom-color, #015450);
    }
    section.live-status > article:nth-of-type(1)::before  { content: "CAMS Services (PROD)"; }
    section.live-status > article:nth-of-type(3)::before  { content: "CAMS Services (DEV)"; }
    section.live-status > article:nth-of-type(9)::before  { content: "Climate Archive"; }
    </style>

# Response time checks run every 6 hours (0, 6, 12, 18 UTC)
workflowSchedule:
  responseTime: "0 */6 * * *"

# See https://upptime.js.org/docs/configuration for more options
# - notifications: Slack, Telegram, Discord, email (SMTP/Sendgrid/etc.)

